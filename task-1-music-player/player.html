<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Now Playing</title>
  <script src="https://cdn.tailwindcss.com?plugins=line-clamp"></script>
</head>

<body class="bg-black text-white flex items-center justify-center min-h-screen">

<div class="w-full max-w-sm mx-auto bg-gray-900 p-6 rounded-2xl shadow-xl text-center">

  <img id="cover" class="w-64 h-64 object-cover rounded-xl mx-auto mb-6 block">

  <h2 id="title" class="text-xl font-bold line-clamp-2"></h2>
  <p id="artist" class="text-gray-400 mb-6"></p>

  <audio id="audio" controls class="w-full"></audio>

  <div class="mt-6 flex justify-center gap-4">
    <button onclick="goBack()" class="bg-gray-800 px-4 py-2 rounded hover:bg-gray-700">
      ⬅ Back
    </button>

    <button onclick="removeFromLibrary()" class="bg-red-600 px-4 py-2 rounded hover:bg-red-500">
      ❌ Remove
    </button>
  </div>

</div>

<script>
const song = JSON.parse(localStorage.getItem("song"));

const cover = document.getElementById("cover");
const title = document.getElementById("title");
const artist = document.getElementById("artist");
const audio = document.getElementById("audio");

if (song) {
  cover.src = song.cover;
  title.innerText = song.title;
  artist.innerText = song.artist;
  audio.src = song.stream;
  audio.play();
}

// Back
function goBack() {
  window.location.href = "index.html";
}

// Remove
function removeFromLibrary() {
  let library = JSON.parse(localStorage.getItem("library")) || [];

  library = library.filter(item => item.stream !== song.stream);

  localStorage.setItem("library", JSON.stringify(library));

  alert("Removed ❌");
}
</script>

</body>
</html>
