<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Calculator with Theme Toggle</title>

<style>
:root {
    --bg: #cfd3dc;
    --calc-bg: #e6e8ee;
    --text: #333;
    --shadow1: #babecc;
    --shadow2: #ffffff;
    --accent: #4a90e2;
}

/* 🌙 Dark Theme */
.dark {
    --bg: #1e1f26;
    --calc-bg: #2a2c36;
    --text: #f1f1f1;
    --shadow1: #1a1b20;
    --shadow2: #343741;
    --accent: #4a90e2;
}

* {
    box-sizing: border-box;
    font-family: 'Segoe UI', sans-serif;
}

body {
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: var(--bg);
    transition: 0.3s;
}

/* Toggle Button */
.toggle {
    position: absolute;
    top: 20px;
    right: 20px;
    padding: 8px 12px;
    border-radius: 10px;
    cursor: pointer;
    border: none;
    background: var(--calc-bg);
    box-shadow: 5px 5px 10px var(--shadow1),
                -5px -5px 10px var(--shadow2);
}

.calculator {
    background: var(--calc-bg);
    padding: 25px;
    border-radius: 20px;
    box-shadow: 10px 10px 20px var(--shadow1),
                -10px -10px 20px var(--shadow2);
    width: 280px;
}

.display {
    width: 100%;
    height: 70px;
    border-radius: 15px;
    background: var(--calc-bg);
    box-shadow: inset 5px 5px 10px var(--shadow1),
                inset -5px -5px 10px var(--shadow2);
    text-align: right;
    font-size: 28px;
    padding: 15px;
    margin-bottom: 20px;
    color: var(--text);
}

.buttons {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 15px;
}

button {
    height: 55px;
    border: none;
    border-radius: 12px;
    font-size: 18px;
    cursor: pointer;
    background: var(--calc-bg);
    color: var(--text);
    box-shadow: 5px 5px 10px var(--shadow1),
                -5px -5px 10px var(--shadow2);
    transition: 0.2s;
}

button:active {
    box-shadow: inset 5px 5px 10px var(--shadow1),
                inset -5px -5px 10px var(--shadow2);
}

.operator, .equal, .top-btn {
    color: var(--accent);
}
</style>
</head>

<body>

<button class="toggle" onclick="toggleTheme()">🌙</button>

<div class="calculator">
    <div id="display" class="display">0</div>

    <div class="buttons">
        <button class="top-btn" onclick="clearDisplay()">AC</button>
        <button class="top-btn" onclick="deleteLast()">DEL</button>
        <button class="top-btn" onclick="append('%')">%</button>
        <button class="operator" onclick="append('/')">/</button>

        <button onclick="append('7')">7</button>
        <button onclick="append('8')">8</button>
        <button onclick="append('9')">9</button>
        <button class="operator" onclick="append('*')">*</button>

        <button onclick="append('4')">4</button>
        <button onclick="append('5')">5</button>
        <button onclick="append('6')">6</button>
        <button class="operator" onclick="append('-')">-</button>

        <button onclick="append('1')">1</button>
        <button onclick="append('2')">2</button>
        <button onclick="append('3')">3</button>
        <button class="operator" onclick="append('+')">+</button>

        <button onclick="append('0')">0</button>
        <button onclick="append('00')">00</button>
        <button onclick="append('.')">.</button>
        <button class="equal" onclick="calculate()">=</button>
    </div>
</div>

<script>
let display = document.getElementById("display");

/* Calculator Logic */
function append(val) {
    display.innerText = display.innerText === "0" ? val : display.innerText + val;
}

function clearDisplay() {
    display.innerText = "0";
}

function deleteLast() {
    display.innerText = display.innerText.slice(0, -1) || "0";
}

function calculate() {
    try {
        let exp = display.innerText.replace('%', '/100');
        display.innerText = eval(exp);
    } catch {
        display.innerText = "Error";
    }
}

/* Keyboard Support */
document.addEventListener("keydown", (e) => {
    let key = e.key;

    if (!isNaN(key) || "+-*/.".includes(key)) append(key);
    if (key === "Enter") { e.preventDefault(); calculate(); }
    if (key === "Backspace") deleteLast();
    if (key.toLowerCase() === "c") clearDisplay();
});

/* 🌗 Theme Toggle */
function toggleTheme() {
    document.body.classList.toggle("dark");

    let isDark = document.body.classList.contains("dark");
    localStorage.setItem("theme", isDark ? "dark" : "light");
}

/* Load saved theme */
window.onload = () => {
    if (localStorage.getItem("theme") === "dark") {
        document.body.classList.add("dark");
    }
};
</script>

</body>
</html>
